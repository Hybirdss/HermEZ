<svg width="800" height="520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg       { fill: #0d1117; }
      .border   { fill: none; stroke: #30363d; stroke-width: 1.5; }
      .section  { fill: #161b22; }
      .green    { font-family: 'Courier New', monospace; font-size: 12px; fill: #3fb950; }
      .white    { font-family: 'Courier New', monospace; font-size: 12px; fill: #c9d1d9; }
      .dim      { font-family: 'Courier New', monospace; font-size: 12px; fill: #484f58; }
      .blue     { font-family: 'Courier New', monospace; font-size: 12px; fill: #58a6ff; }
      .yellow   { font-family: 'Courier New', monospace; font-size: 12px; fill: #d29922; }
      .step     { font-family: -apple-system, sans-serif; font-size: 11px; fill: #8b949e; letter-spacing: 0.5px; }
      .stepnum  { font-family: -apple-system, sans-serif; font-size: 11px; fill: #3fb950; font-weight: bold; }
      .radio-on  { fill: #3fb950; }
      .radio-off { fill: none; stroke: #484f58; stroke-width: 1.2; }
      .check     { fill: #3fb950; }
      .wait      { fill: #d29922; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="8" class="bg"/>
  <rect x="1" y="1" width="798" height="518" rx="7" class="border"/>

  <!-- Terminal dots -->
  <circle cx="24" cy="20" r="5" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="5" fill="#febc2e"/>
  <circle cx="60" cy="20" r="5" fill="#28c840"/>
  <line x1="1" y1="36" x2="799" y2="36" stroke="#30363d" stroke-width="1"/>

  <!-- STEP 1: OS 선택 -->
  <text x="24" y="60" class="stepnum">STEP 1</text>
  <text x="70" y="60" class="step">  OS 선택</text>

  <rect x="16" y="70" width="370" height="110" rx="4" class="section"/>
  <rect x="16" y="70" width="370" height="110" rx="4" class="border"/>

  <text x="32" y="90"  class="white">어떤 환경에서 설치하시나요?</text>
  <circle cx="44"  cy="106" r="5" class="radio-on"/>
  <text x="56"  y="110" class="green">Mac                    </text><text x="160" y="110" class="dim">바로 시작 가능</text>
  <circle cx="44"  cy="123" r="5" class="radio-off"/>
  <text x="56"  y="127" class="dim">Linux / WSL2</text>
  <circle cx="44"  cy="140" r="5" class="radio-off"/>
  <text x="56"  y="144" class="dim">Windows (WSL2 없음)</text>
  <circle cx="44"  cy="157" r="5" class="radio-off"/>
  <text x="56"  y="161" class="dim">Android (Termux)</text>

  <!-- STEP 2: 설치 중 -->
  <text x="414" y="60" class="stepnum">STEP 2</text>
  <text x="460" y="60" class="step">  자동 설치</text>

  <rect x="406" y="70" width="378" height="110" rx="4" class="section"/>
  <rect x="406" y="70" width="378" height="110" rx="4" class="border"/>

  <text x="422" y="90"  class="white">설치 중...  (2~5분)</text>
  <text x="422" y="108" class="green">▸ Python 3.11    </text><text x="550" y="108" class="green">완료 ✓</text>
  <text x="422" y="124" class="green">▸ Node.js        </text><text x="550" y="124" class="green">완료 ✓</text>
  <text x="422" y="140" class="yellow">▸ hermes-agent   </text><text x="550" y="140" class="yellow">설치 중...</text>
  <text x="422" y="156" class="dim">▸ 브라우저 도구  </text><text x="550" y="156" class="dim">대기 중</text>
  <!-- Progress bar -->
  <rect x="422" y="164" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="422" y="164" width="200" height="6" rx="3" fill="#3fb950"/>

  <!-- STEP 3: API 키 -->
  <text x="24" y="212" class="stepnum">STEP 3</text>
  <text x="70" y="212" class="step">  API 키 설정</text>

  <rect x="16" y="222" width="370" height="130" rx="4" class="section"/>
  <rect x="16" y="222" width="370" height="130" rx="4" class="border"/>

  <text x="32" y="242"  class="white">AI 모델 API 키가 있으신가요?</text>
  <circle cx="44"  cy="260" r="5" class="radio-on"/>
  <text x="56"  y="264" class="green">없음, 지금 만들기   </text><text x="200" y="264" class="dim">무료로 시작 가능</text>
  <circle cx="44"  cy="278" r="5" class="radio-off"/>
  <text x="56"  y="282" class="dim">OpenRouter 키 있음</text>
  <circle cx="44"  cy="295" r="5" class="radio-off"/>
  <text x="56"  y="299" class="dim">Anthropic 키 있음</text>
  <circle cx="44"  cy="312" r="5" class="radio-off"/>
  <text x="56"  y="316" class="dim">OpenAI 키 있음</text>

  <rect x="28" y="325" width="344" height="22" rx="3" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="36" y="340" class="green">openrouter.ai → Keys → Create Key</text>

  <!-- STEP 4: 메신저 -->
  <text x="414" y="212" class="stepnum">STEP 4</text>
  <text x="460" y="212" class="step">  메신저 연동 (선택)</text>

  <rect x="406" y="222" width="378" height="130" rx="4" class="section"/>
  <rect x="406" y="222" width="378" height="130" rx="4" class="border"/>

  <text x="422" y="242"  class="white">메신저 연동을 설정할까요?</text>
  <circle cx="434" cy="260" r="5" class="radio-off"/>
  <text x="446" y="264" class="dim">Telegram   </text><text x="530" y="264" class="dim">봇 만들고 폰에서 AI 사용</text>
  <circle cx="434" cy="278" r="5" class="radio-off"/>
  <text x="446" y="282" class="dim">Discord    </text><text x="530" y="282" class="dim">서버에 봇 초대</text>
  <circle cx="434" cy="295" r="5" class="radio-on"/>
  <text x="446" y="299" class="green">나중에     </text><text x="530" y="299" class="dim">지금은 건너뜁니다</text>

  <text x="422" y="325" class="dim">나중에 연동하려면:</text>
  <text x="422" y="341" class="blue">hermes gateway setup</text>

  <!-- Divider -->
  <line x1="16" y1="375" x2="784" y2="375" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- STEP 5: 완료 -->
  <rect x="16" y="385" width="768" height="118" rx="4" fill="#0f2a1a"/>
  <rect x="16" y="385" width="768" height="118" rx="4" fill="none" stroke="#3fb950" stroke-width="1"/>

  <text x="400" y="410" text-anchor="middle" class="green" style="font-size:14px; font-weight:bold;">✓  설치 완료!</text>

  <text x="100" y="434" class="dim">터미널:</text>  <text x="180" y="434" class="green">hermes</text>
  <text x="340" y="434" class="dim">Telegram:</text> <text x="430" y="434" class="green">봇에게 메시지 보내기</text>
  <text x="600" y="434" class="dim">업데이트:</text> <text x="680" y="434" class="green">hermes update</text>

  <text x="100" y="454" class="dim">문제 생기면:</text> <text x="200" y="454" class="green">hermes doctor</text>

  <text x="400" y="480" text-anchor="middle" class="yellow">⭐  도움이 됐다면 GitHub 별 하나 부탁드려요!  →  github.com/Hybirdss/HermEZ</text>

  <text x="784" y="498" text-anchor="end" class="dim">made by hybirdss</text>
</svg>
